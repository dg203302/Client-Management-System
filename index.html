<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Estilos/estilos_pantalla_carga.css">
    <title>Bienvenido</title>
</head>
<body>
    pantalla de carga
    <script type="module">
        import { loadSupaBseWithAuth } from '../Scripts/supabase.js';
        const clientesup = await loadSupaBseWithAuth();
        window.onload = async function(){
            const id_usuario = localStorage.getItem('UserID');
            if (id_usuario) {
                window.location.href = '/Plantillas/Inicio.html';
            } else {

                const {data: { session }, error} = await clientesup.auth.getSession();

                if (error) {
                    alert('Error al obtener la sesión:', error);
                }
                else if (session){
                    alert('Mensaje temporal = Sesión obtenida:', session);
                    localStorage.setItem('UserID', session.user.id);
                    localStorage.setItem('UserName', session.user.user_metadata.full_name);
                    window.location.href = '/Plantillas/Inicio.html';
                }
                else {
                    alert('Mensaje temporal =No hay sesión activa');
                    window.location.href = '/Plantillas/inicio_sesion.html';
                }
            }
        }
    </script>
</body>
</html>
